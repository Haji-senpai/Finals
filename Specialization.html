<!DOCTYPE html>
<html>
<head>
	<title>Specialization</title>
	<style>
		body {
			background-color: lightgreen;
		}
		div {
			margin-top: 20px;
			margin-bottom: 16px;
			margin-left: 5px;
			margin-right: 5px;
			background-image: url(back.jpg);
			background-repeat: no-repeat;
			background-size: cover;
			border: 5px solid black;
			border-style: none;
		}
		ul {
			list-style-type: none;
			margin: 0;
			padding: 0;
			overflow: hidden;
			top: 0;
			width: 100%;
			font-size: 16px;
			background-color: none;
		}
		li {
			float: left;
		}
		li a, .dropdownbtn {
			display: inline-block;
			color: white;
			text-align: center;
			padding: 14px 16px;
			text-decoration: none;
		}
		li a:hover, .dropdown:hover .dropbtn {
			background-color: red;
		}
		li.dropdown {
			display: inline-block;
		}
		.dropdown-content {
			display: none;
			position: absolute;
			background-color: #F9F9F9;
			min-width: 160px;
			box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2);
			padding: 12px 16px;
			z-index: 1;
		}
		.dropdown-content a {
			color: black;
			padding: 12px 16px;
			text-decoration: none;
			display: block;
			text-align: left;
		}
		.dropdown-content a:hover {
			background-color: #F1F1F1;
		}
		.dropdown:hover .dropdown-content {
			display: block;
		}
	</style>
</head>
<body>
	
</body>
</html>
