<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator</title>
  <style>
    :root {
      --bg:darkred; 
      --panel: #9C0000;
      --accent: black;
      --muted: #fca5a5;
      --glass: #4a0000;
      --button: #4a0000;
      --button-hover:rgba(255,255,255,0.08);
      font-family:Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
    }
    * {
    box-sizing:border-box;
    }
    html,body {
    height:100%;
    }    
    body{
      margin:0;
      background:linear-gradient(180deg,var(--bg),#1a0000 120%);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:28px;
      color:#ffecec;
    }

    .calculator{
      width:100%;
      max-width:420px;
      background:linear-gradient(180deg,var(--panel), #000000 120%);
      border-radius:18px;
      padding:18px;
      box-shadow:0 10px 30px rgba(64,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.05);
      display:flex;
      flex-direction:column;
      gap:14px;
    }

    .brand {
    display:flex;
    align-items:
    center;gap:10px
    }
    .logo {
    width:46px;
    height:46px;
    border-radius:10px;
    background:linear-gradient(135deg,var(--accent),#ff1a1a);
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:700;color:white
    }
    .brand h1 {
    font-size:16px;margin:0
    }
    .brand p {
    margin:0;
    font-size:12px;
    color:var(--muted)
    }
    .display {
      background:var(--glass);
      padding:14px;
      border-radius:12px;
      text-align:right;
      min-height:86px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      gap:6px;
    }
    .expression {
    font-size:14px;
    color:var(--muted);
    word-wrap:break-word;
    opacity:0.95
    }
    .result {
    font-size:28px;
    font-weight:600;
    word-wrap:break-word
    }

    .keys {
    display:grid;
    grid-template-columns:repeat(4,1fr);gap:10px
    }
    button.key {
      background:var(--button);
      border:0;
      padding:18px;
      border-radius:10px;
      font-size:18px;
      color:inherit;
      cursor:pointer;
      box-shadow:inset 0 -3px 0 rgba(0,0,0,0.3), 0 4px 10px rgba(64,0,0,0.6);
    }
    button.key:active {
    transform:translateY(1px)
    }
    button.key:hover {
    background:var(--button-hover)
    }

    .key.operator {
    background:linear-gradient(180deg, rgba(255,77,77,0.2), rgba(255,26,26,0.1));color:var(--accent);
    font-weight:600;
    color: white;
    }
    .key.double {
    grid-column:span 2
    }
    .key.wide {
    grid-column:span 3
    }

    .footer {
    display:flex;
    justify-content:
    space-between;
    align-items:center;
    font-size:12px;
    color:var(--muted)
    
    @media (max-width:420px){
      .result{font-size:24px}
      button.key{padding:14px}
    }
  </style>
</head>
<body>
  <main class="calculator" role="application" aria-label="Calculator">
    <div class="brand">
      <div class="logo">C</div>
      <div>
        <h1>CASIO</h1>
        <p>Basic Calculation using Basic Operation</p>
      </div>
    </div>
    <div class="display" id="display" aria-live="polite">
      <div class="expression" id="expression">0</div>
      <div class="result" id="result">0</div>
    </div>
    <div class="keys">
      <button class="key" data-action="clear" aria-label="All Clear">C</button>
      <button class="key" data-action="back" aria-label="Backspace">⌫</button>
      <button class="key" data-value="%">%</button>
      <button class="key operator" data-value="/">÷</button>
      <button class="key" data-value="7">7</button>
      <button class="key" data-value="8">8</button>
      <button class="key" data-value="9">9</button>
      <button class="key operator" data-value="*">×</button>
      <button class="key" data-value="4">4</button>
      <button class="key" data-value="5">5</button>
      <button class="key" data-value="6">6</button>
      <button class="key operator" data-value="-">−</button>
      <button class="key" data-value="1">1</button>
      <button class="key" data-value="2">2</button>
      <button class="key" data-value="3">3</button>
      <button class="key operator" data-value="+">+</button>
      <button class="key double" data-value="0">0</button>
      <button class="key" data-value=".">.</button>
      <button class="key operator" data-action="equals" aria-label="Equals">=</button>
          </div>
    <div class="footer">
    <div>©Alsudaisi T. Olama &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;BSIT - 101</div>
<div>11/14/25</div>
</div>

  </main>

  <script>
    (function(){
      const expressionEl = document.getElementById('expression');
      const resultEl = document.getElementById('result');
      const keys = document.querySelectorAll('button.key');

      let expr = '';

      function updateDisplay(){
        expressionEl.textContent = expr || '0';
        try{
          const val = expr && isExpressionValid(expr) ? evaluateExpression(expr) : '';
          resultEl.textContent = (val === '' || val === null) ? '0' : String(val);
        }catch(e){
          resultEl.textContent = 'Error 404';
        }
      }

      function isExpressionValid(s){
        return /^[0-9+\-*/().%\s]+$/.test(s);
      }

      function prepareForEval(s){
        s = s.replaceAll('×','*').replaceAll('÷','/').replaceAll('−','-');
        s = s.replace(/(\d+(?:\.\d+)?)%/g, '($1/100)');
        return s;
      }

      function evaluateExpression(s){
        const safe = prepareForEval(s);
        if(!/^[0-9+\-*/().\s]+$/.test(safe)) throw new Error('Invalid chars');
        const raw = Function('return ('+safe+')')();
        if(raw === Infinity || raw === -Infinity || Number.isNaN(raw)) throw new Error('Math error');
        const rounded = Math.round((raw + Number.EPSILON) * 1e12) / 1e12;
        return rounded;
      }

      function pushValue(val){
        const last = expr.slice(-1);
        if(val === '.'){
          const parts = expr.split(/[^0-9.]/);
          if(parts[parts.length-1].includes('.')) return;
          if(last === '' || /[+\-*/(]/.test(last)) expr += '0';
        }

        if(/[+\-*/]/.test(val)){
          if(expr === '' && val !== '-') return;
          if(/[+\-*/]/.test(last)){
            expr = expr.slice(0,-1) + val;
          }else{
            expr += val;
          }
        }else if(val === '%'){
          if(/[0-9)]/.test(last)) expr += '%';
        }else{
          expr += val;
        }
        updateDisplay();
      }

      keys.forEach(k=>{
        k.addEventListener('click', ()=>{
          const action = k.dataset.action;
          const val = k.dataset.value;
          if(action === 'clear'){
            expr = '';
            updateDisplay();
            return;
          }
          if(action === 'back'){
            expr = expr.slice(0,-1);
            updateDisplay();
            return;
          }
          if(action === 'equals'){
            try{
              if(!expr) return;
              const val = evaluateExpression(expr);
              expr = String(val);
            }catch(e){
              expr = '';
              resultEl.textContent = 'Error';
            }
            updateDisplay();
            return;
          }
          if(val !== undefined){
            pushValue(val);
          }
        });
      });

      window.addEventListener('keydown', (e)=>{
        if(e.key >= '0' && e.key <= '9') { pushValue(e.key); e.preventDefault(); return; }
        if(e.key === '.') { pushValue('.'); e.preventDefault(); return; }
        if(e.key === 'Enter' || e.key === '='){
          document.querySelector('button[data-action="equals"]').click(); e.preventDefault(); return;
        }
        if(e.key === 'Backspace') { document.querySelector('button[data-action="back"]').click(); e.preventDefault(); return; }
        if(e.key === 'Escape') { document.querySelector('button[data-action="clear"]').click(); e.preventDefault(); return; }
        if(['+','-','*','/','(',')'].includes(e.key)) { pushValue(e.key); e.preventDefault(); return; }
        if(e.key === '%'){ pushValue('%'); e.preventDefault(); return; }
      });

      updateDisplay();
    })();
  </script>
</body>
</html>
