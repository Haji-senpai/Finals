        ul {
            list-style: none;
            background-color: darkgreen;
        }
        ul li {
            display: inline-block;
            position: relative;
        }
        ul li a {
            display: block;
            padding: 20px 25px;
            color: #fff;
            text-decoration: none;
            text-align: center

        }

            background: #50C878;

            display: none;

        }
        ul li:hover ul.dropdown {

        }
